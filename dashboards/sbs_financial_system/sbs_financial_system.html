<script>
window.addEventListener('load', function() {
  setTimeout(function() {

    // 1. Valores por defecto en los filtros
    let filterPeriodo = document.getElementById("PERIODO").getElementsByClassName("selectized")[0];
    if (filterPeriodo) {
      filterPeriodo.selectize.on('change', function(value) {
        document.getElementById("caja-mes").innerText = value || "-";
      });
      filterPeriodo.selectize.setValue("2026", false);
    }

    let filterTipo = document.getElementById("TIPO").getElementsByClassName("selectized")[0];
    if (filterTipo) filterTipo.selectize.setValue("Banca Multiple EEFF", false);

    let filterMoneda = document.getElementById("MONEDA").getElementsByClassName("selectized")[0];
    if (filterMoneda) filterMoneda.selectize.setValue("TOTAL", false);

    // 2. Un solo listener draw.dt que actualiza ambas cajas
    $(document).on('draw.dt', function() {
      if (!$.fn.dataTable.isDataTable('.dataTable')) return;
      
      let dt = $('.dataTable').DataTable();

      // Caja entidades
      let caja_entidades = document.getElementById("caja-entidades");
      if (caja_entidades) {
        caja_entidades.innerText = dt.page.info().recordsDisplay;
      }

      // Caja mes — leer columna MES de filas visibles
      let colIndex = null;
      dt.columns().every(function(i) {
        if (dt.column(i).header().innerText.trim() === "MES") colIndex = i;
      });

      if (colIndex !== null) {
        let meses = [...new Set(
          dt.column(colIndex, { search: 'applied' }).data().toArray()
        )];
        let caja_mes = document.getElementById("caja-mes");
        if (caja_mes) caja_mes.innerText = meses.length === 1 ? meses[0] : meses.join(", ");
      }
    });

    // 3. Lectura inicial por si la tabla ya se dibujó antes del listener
    if ($.fn.dataTable.isDataTable('.dataTable')) {
      $('.dataTable').DataTable().draw();
    }

  }, 500);
});
