# Opciones aplicadas a todos los posts de esta carpeta
freeze: true

# Estética del título
title-block-banner: true

# Configuración de formato
format:
  html:
    toc: true
    toc-location: left
    toc-title: "Contenido"
    toc-depth: 3
    code-fold: true
    code-copy: true
    code-tools: true
    number-sections: true
    smooth-scroll: true
    